name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          # Build must succeed without secrets; runtime config is injected in Vercel.
          VITE_SUPABASE_URL: "https://example.supabase.co"
          VITE_SUPABASE_ANON_KEY: "ci-placeholder"
